<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 배경 라운드 사각형 -->
  <rect width="64" height="64" rx="12" fill="#2563eb"/>

  <!-- 종이 (커팅 대상) -->
  <rect x="10" y="22" width="34" height="26" rx="2" fill="#ffffff" opacity="0.95"/>
  <!-- 커팅된 지그재그 선 -->
  <path d="M 10 35 L 16 31 L 22 35 L 28 31 L 34 35 L 40 31 L 44 35"
        stroke="#dc2626" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 커팅 칼: 손잡이 -->
  <rect x="38" y="6" width="6" height="22" rx="1.5" fill="#1e293b"
        transform="rotate(35 41 17)"/>
  <!-- 칼날 -->
  <polygon points="44,22 56,34 52,40 40,28"
           fill="#e2e8f0" stroke="#94a3b8" stroke-width="0.8"/>
  <!-- 칼날 하이라이트 -->
  <line x1="44" y1="24" x2="54" y2="34" stroke="#ffffff" stroke-width="1" opacity="0.8"/>
  <!-- 칼끝 빛 -->
  <circle cx="55" cy="35" r="1.5" fill="#fef08a"/>
</svg>
